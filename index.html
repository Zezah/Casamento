<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pato Branco vs Francisco Beltrão · Casamento J&B</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pb: #1A4F8A; --pb-light: #2E6DB4; --pb-glow: rgba(26,79,138,0.4);
    --fb: #4A2080; --fb-light: #6B35B8; --fb-glow: rgba(74,32,128,0.4);
    --gold: #C9A84C; --cream: #F5F0E8; --dark: #0A0A0F;
  }
  html, body { height: 100%; background: var(--dark); color: var(--cream); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }
  .app {
    position: relative; z-index: 1;
    display: grid; grid-template-rows: auto 1fr auto auto;
    height: 100vh; padding: 2.5rem 3rem; gap: 2rem;
    max-width: 1400px; margin: 0 auto;
  }
  .header { text-align: center; }
  .header .eyebrow { font-size: clamp(11px,1.2vw,14px); letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem,4.5vw,3.5rem); letter-spacing: 0.08em; color: var(--cream); line-height: 1; }
  .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 2rem; align-items: center; }
  .team { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; padding: 2.5rem 2rem; border-radius: 20px; transition: transform 0.4s ease, box-shadow 0.4s ease; }
  .team.pb { background: linear-gradient(135deg,rgba(26,79,138,0.25),rgba(26,79,138,0.06)); border: 1px solid rgba(46,109,180,0.25); box-shadow: 0 0 40px var(--pb-glow), inset 0 1px 0 rgba(255,255,255,0.06); }
  .team.fb { background: linear-gradient(135deg,rgba(74,32,128,0.25),rgba(74,32,128,0.06)); border: 1px solid rgba(107,53,184,0.25); box-shadow: 0 0 40px var(--fb-glow), inset 0 1px 0 rgba(255,255,255,0.06); }
  .team.winning { transform: scale(1.03); }
  .team.winning.pb { box-shadow: 0 0 80px var(--pb-glow), 0 0 140px rgba(26,79,138,0.12), inset 0 1px 0 rgba(255,255,255,0.1); border-color: rgba(46,109,180,0.55); }
  .team.winning.fb { box-shadow: 0 0 80px var(--fb-glow), 0 0 140px rgba(74,32,128,0.12), inset 0 1px 0 rgba(255,255,255,0.1); border-color: rgba(107,53,184,0.55); }
  .team-badge { font-size: clamp(9px,1vw,11px); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
  .pb .team-badge { background: rgba(46,109,180,0.18); color: #7EB4E8; }
  .fb .team-badge { background: rgba(107,53,184,0.18); color: #B07AE8; }
  .team-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8rem,4vw,3.2rem); letter-spacing: 0.06em; line-height: 1; text-align: center; }
  .pb .team-name { color: #A8CFEF; }
  .fb .team-name { color: #C5A0EE; }
  .score { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem,12vw,10rem); line-height: 1; letter-spacing: -0.02em; transition: all 0.5s ease; }
  .pb .score { color: #fff; text-shadow: 0 0 40px rgba(46,109,180,0.7); }
  .fb .score { color: #fff; text-shadow: 0 0 40px rgba(107,53,184,0.7); }
  .team-sub { font-size: clamp(11px,1.2vw,14px); color: rgba(245,240,232,0.35); }
  .vs-col { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .vs-text { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8rem,3.5vw,3rem); color: var(--gold); letter-spacing: 0.1em; }
  .total-box { text-align: center; padding: 0.7rem 1.2rem; background: rgba(201,168,76,0.07); border: 1px solid rgba(201,168,76,0.18); border-radius: 10px; }
  .total-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); opacity: 0.6; margin-bottom: 2px; }
  .total-value { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.1rem,2.2vw,1.7rem); color: var(--gold); letter-spacing: 0.05em; }
  .winner-banner { display: none; text-align: center; padding: 0.4rem 1.2rem; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: clamp(0.9rem,1.6vw,1.2rem); letter-spacing: 0.12em; }
  .winner-banner.pb { background: rgba(26,79,138,0.18); color: #7EB4E8; border: 1px solid rgba(46,109,180,0.3); }
  .winner-banner.fb { background: rgba(74,32,128,0.18); color: #B07AE8; border: 1px solid rgba(107,53,184,0.3); }
  .winner-banner.show { display: block; }
  .bar-wrap { display: flex; flex-direction: column; gap: 0.6rem; }
  .bar-track { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; display: flex; }
  .bar-pb { background: linear-gradient(90deg,var(--pb),var(--pb-light)); transition: width 0.9s cubic-bezier(0.4,0,0.2,1); }
  .bar-fb { background: linear-gradient(90deg,var(--fb-light),var(--fb)); transition: width 0.9s cubic-bezier(0.4,0,0.2,1); }
  .bar-labels { display: flex; justify-content: space-between; font-size: clamp(11px,1.2vw,13px); }
  .bar-labels span:first-child { color: #7EB4E8; }
  .bar-labels span:last-child { color: #B07AE8; }
  .footer { display: flex; justify-content: center; align-items: center; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.05); }
  .update-status { display: flex; align-items: center; gap: 0.5rem; font-size: clamp(10px,1.1vw,12px); color: rgba(245,240,232,0.2); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ADE80; box-shadow: 0 0 8px #4ADE80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="eyebrow">Casamento José & Bruna · 2026</div>
    <h1>Qual cidade é maior?</h1>
  </header>

  <div class="scoreboard">
    <div class="team pb" id="team-pb">
      <div class="team-badge">Time do noivo</div>
      <div class="team-name">Pato Branco</div>
      <div class="score" id="score-pb">0</div>
      <div class="team-sub" id="sub-pb">0 votos</div>
    </div>
    <div class="vs-col">
      <div class="vs-text">VS</div>
      <div class="winner-banner" id="winner-banner"></div>
    </div>
    <div class="team fb" id="team-fb">
      <div class="team-badge">Time da noiva</div>
      <div class="team-name">Francisco Beltrão</div>
      <div class="score" id="score-fb">0</div>
      <div class="team-sub" id="sub-fb">0 votos</div>
    </div>
  </div>

  <div class="bar-wrap">
    <div class="bar-track">
      <div class="bar-pb" id="bar-pb" style="width:50%"></div>
      <div class="bar-fb" id="bar-fb" style="width:50%"></div>
    </div>
    <div class="bar-labels">
      <span id="pct-pb">50%</span>
      <span id="pct-fb">50%</span>
    </div>
  </div>

  <footer class="footer">
    <div class="update-status">
      <div class="live-dot"></div>
      <span id="update-status">Conectando...</span>
    </div>
  </footer>
</div>

<script>
const SHEET_ID = '1ptI6HhPExDGwbKFa0f08Wp2Rm5H8W51bHCMGb_zimT4';
const SHEET_NAME = 'Votos';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

function fmt(n) {
  return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

async function fetchData() {
  try {
    const res = await fetch(URL + '&t=' + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows || [];

    let pbTotal = 0, fbTotal = 0, pbCount = 0, fbCount = 0;
    rows.forEach(row => {
      const cells = row.c || [];
      const valor = cells[1] && cells[1].v ? parseFloat(cells[1].v) : 0;
      const cidade = cells[2] && cells[2].v ? String(cells[2].v) : '';
      if (!cidade || !valor) return;
      if (cidade.toLowerCase().includes('pato')) { pbTotal += valor; pbCount++; }
      else { fbTotal += valor; fbCount++; }
    });

    document.getElementById('score-pb').textContent = Math.round(pbTotal);
    document.getElementById('score-fb').textContent = Math.round(fbTotal);
    document.getElementById('sub-pb').textContent = `${pbCount} voto${pbCount !== 1 ? 's' : ''}`;
    document.getElementById('sub-fb').textContent = `${fbCount} voto${fbCount !== 1 ? 's' : ''}`;

    const total = pbTotal + fbTotal;
    document.getElementById('total-val').textContent = fmt(total);

    const pctPB = total > 0 ? Math.round(pbTotal / total * 100) : 50;
    const pctFB = 100 - pctPB;
    document.getElementById('bar-pb').style.width = pctPB + '%';
    document.getElementById('bar-fb').style.width = pctFB + '%';
    document.getElementById('pct-pb').textContent = pctPB + '%';
    document.getElementById('pct-fb').textContent = pctFB + '%';

    const teamPB = document.getElementById('team-pb');
    const teamFB = document.getElementById('team-fb');
    const banner = document.getElementById('winner-banner');
    teamPB.classList.remove('winning');
    teamFB.classList.remove('winning');

    if (pbTotal > fbTotal) {
      teamPB.classList.add('winning');
      banner.className = 'winner-banner pb show';
      banner.textContent = 'Pato Branco na frente!';
    } else if (fbTotal > pbTotal) {
      teamFB.classList.add('winning');
      banner.className = 'winner-banner fb show';
      banner.textContent = 'Francisco Beltrão na frente!';
    } else {
      banner.className = 'winner-banner';
    }

    const now = new Date();
    document.getElementById('update-status').textContent =
      `Atualizado às ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  } catch(e) {
    document.getElementById('update-status').textContent = 'Erro ao atualizar — tentando novamente...';
  }
}

fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
